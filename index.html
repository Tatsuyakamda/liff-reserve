<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>予約フォーム</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --bg:#ffffff; --text:#111827; --muted:#6b7280; --border:#e5e7eb; --focus:#2563eb; }
    body {
      margin: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { margin: 0 0 14px; font-size: 22px; letter-spacing: .02em; }
    .card { border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    label { display:block; margin-top: 12px; font-weight: 700; font-size: 14px; }
    .required::after { content:"（必須）"; color: var(--muted); font-weight: 600; margin-left: 6px; }
    .section-title { margin-top: 18px; font-weight: 800; font-size: 15px; }
    .sub { margin-top: 10px; padding: 12px; border: 1px solid var(--border); border-radius: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
    input {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: var(--focus); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 900;
      border: 0;
      border-radius: 14px;
      background: #111827;
      color: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>予約フォーム</h1>

      <form id="form">
        <label for="name" class="required">お名前</label>
        <input id="name" name="name" type="text" required autocomplete="name" />

        <div class="section-title">ご予約第1希望</div>
        <div class="sub">
          <div class="grid">
            <div>
              <label for="date1" class="required">日付:</label>
              <input id="date1" name="date1" type="date" required />
            </div>
            <div>
              <label for="time1" class="required">時間:</label>
              <input id="time1" name="time1" type="time" required />
            </div>
          </div>
        </div>

        <div class="section-title">ご予約第2希望</div>
        <div class="sub">
          <div class="grid">
            <div>
              <label for="date2">日付:</label>
              <input id="date2" name="date2" type="date" />
            </div>
            <div>
              <label for="time2">時間:</label>
              <input id="time2" name="time2" type="time" />
            </div>
          </div>
        </div>

        <button id="submitBtn" type="submit">送信する</button>
      </form>
    </div>
  </div>

  <script>
    // 固定値（あなたの環境）
    const LIFF_ID = "2009276936-E6Lu6Spd";
    const OA_LINE_ID = "@558ybtzq";

    const $ = (id) => document.getElementById(id);

    function formatDate(isoDate) {
      // input[type=date] -> "YYYY-MM-DD" を "YYYY/MM/DD" に
      return isoDate ? isoDate.replaceAll("-", "/") : "";
    }

    function buildDraftText({ name, date1, time1, date2, time2 }) {
      const hasSecond = Boolean(date2 || time2);

      const lines = [
        "予約フォーム",
        "",
        `お名前：${name}`,
        "",
        "ご予約第1希望",
        `日付：${formatDate(date1)}`,
        `時間：${time1}`
      ];

      if (hasSecond) {
        lines.push(
          "",
          "ご予約第2希望",
          `日付：${formatDate(date2)}`,
          `時間：${time2}`
        );
      }

      return lines.join("\n");
    }

    async function main() {
      // LIFF初期化（サンプルは公式ドキュメント参照）
      // https://developers.line.biz/ja/docs/liff/developing-liff-apps/ [Source]
      await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });

      $("form").addEventListener("submit", (e) => {
        e.preventDefault();

        if (!$("form").reportValidity()) return;

        const payload = {
          name: $("name").value.trim(),
          date1: $("date1").value,
          time1: $("time1").value,
          date2: $("date2").value,
          time2: $("time2").value
        };

        const text = buildDraftText(payload);

        // 公式アカウントのトーク画面を開き、入力欄にテキストをセット（未送信）
        // https://developers.line.biz/ja/docs/line-login/using-line-url-scheme/#opening-chat-screen [Source]
        const url =
          "https://line.me/R/oaMessage/" +
          encodeURIComponent(OA_LINE_ID) +
          "/?" +
          encodeURIComponent(text);

        $("submitBtn").disabled = true;

        try {
          if (liff.isInClient()) {
            // LINEアプリ内（LIFFブラウザ）でトークを開く
            liff.openWindow({ url, external: false });
          } else {
            // 外部ブラウザ時のフォールバック
            window.location.href = url;
          }
        } finally {
          // 画面遷移しないケースに備えて戻す（通常は即遷移する）
          setTimeout(() => { $("submitBtn").disabled = false; }, 800);
        }
      });
    }

    main().catch(() => {
      // 画面要件に合わせて、エラー表示（説明文/プレビュー）は出さない
      // 必要ならブラウザのコンソールで確認してください
    });
  </script>
</body>
</html>
