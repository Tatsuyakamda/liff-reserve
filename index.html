<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>予約（LIFF）</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; margin: 16px; }
    .card { max-width: 560px; margin: 0 auto; padding: 16px; border: 1px solid #ddd; border-radius: 12px; }
    label { display:block; margin-top: 12px; font-weight: 600; }
    input, select, button { width: 100%; font-size: 16px; padding: 10px; margin-top: 6px; }
    button { margin-top: 16px; font-weight: 700; }
    pre { background:#f7f7f7; padding:12px; border-radius:10px; white-space:pre-wrap; }
    .note { margin-top: 10px; color:#555; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 8px;">予約</h1>

    <label>お名前（任意）</label>
    <input id="name" type="text" placeholder="例：山田 太郎" />

    <label>希望日</label>
    <input id="date" type="date" />

    <label>時間</label>
    <select id="time">
      <option value="">選択してください</option>
      <option>10:00</option><option>10:30</option>
      <option>11:00</option><option>11:30</option>
      <option>12:00</option><option>12:30</option>
      <option>13:00</option><option>13:30</option>
      <option>14:00</option><option>14:30</option>
      <option>15:00</option><option>15:30</option>
      <option>16:00</option><option>16:30</option>
      <option>17:00</option>
    </select>

    <button id="btn">LINEの入力欄に反映（未送信）</button>

    <div class="note">
      ボタン押下後、公式アカウント（@558ybtzq）のトーク画面を開き、入力欄に文章を入れます（送信はしません）。<br>
      仕組み：<code>https://line.me/R/oaMessage/…</code>（LINE URLスキーム）[Source]
      https://developers.line.biz/ja/docs/line-login/using-line-url-scheme/#opening-chat-screen
    </div>

    <h2 style="margin-top:18px;font-size:16px;">プレビュー（入力欄に入る文章）</h2>
    <pre id="preview"></pre>
  </div>

  <script>
    const OA_LINE_ID = "@558ybtzq";
    const LIFF_ID = "2009276936-E6Lu6Spd";

    const $ = (id) => document.getElementById(id);

    function formatDateYYYYMMDD(isoDate) {
      if (!isoDate) return "";
      return isoDate.replaceAll("-", "/");
    }

    function buildDraftText() {
      const name = $("name").value.trim();
      const date = formatDateYYYYMMDD($("date").value);
      const time = $("time").value;

      // 未入力は空欄のまま残す
      const lines = [
        "お名前", name || "",
        "",
        "希望日", date || "",
        "",
        "時間", time || ""
      ];
      return lines.join("\n").trimEnd();
    }

    function updatePreview() {
      $("preview").textContent = buildDraftText();
    }

    async function main() {
      updatePreview();
      ["name","date","time"].forEach(id => {
        $(id).addEventListener("input", updatePreview);
        $(id).addEventListener("change", updatePreview);
      });

      // 公式：外部ブラウザ対策として withLoginOnExternalBrowser を使える
      // https://developers.line.biz/ja/docs/liff/developing-liff-apps/ [Source]
      await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });

      $("btn").addEventListener("click", () => {
        const text = buildDraftText();

        // 公式アカウントのトーク画面を開き、入力欄にテキストをセット
        // https://developers.line.biz/ja/docs/line-login/using-line-url-scheme/#opening-chat-screen [Source]
        const url =
          "https://line.me/R/oaMessage/" +
          encodeURIComponent(OA_LINE_ID) +
          "/?" +
          encodeURIComponent(text);

        // LIFF内（LINEアプリ内）なら openWindow が基本
        // openWindow例：https://developers.line.biz/ja/docs/liff/developing-liff-apps/ [Source]
        if (liff.isInClient()) {
          liff.openWindow({ url, external: false });
        } else {
          // 外部ブラウザ時のフォールバック
          window.location.href = url;
        }
      });
    }

    main().catch((err) => {
      console.error(err);
      alert("LIFF初期化に失敗。Endpoint URL配下で開けているか等を確認してください。");
    });
  </script>
</body>
</html>
